name: taxeasy_app
description: TaxEasy — Hỗ trợ hộ kinh doanh quản lý bán hàng & hóa đơn điện tử.

publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local DB
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.0

  # HTTP
  dio: ^5.7.0

  # QR
  qr_flutter: ^4.1.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0

  # Charts
  fl_chart: ^0.70.0

  # State management
  provider: ^6.1.2
  shared_preferences: ^2.5.3

  # Connectivity (auto-sync khi có mạng trở lại)
  connectivity_plus: ^6.1.0

  # Export & share
  share_plus: ^10.0.3
  open_file: ^3.3.2
  path_provider: ^2.1.5
  pdf: ^3.11.3

  # Image picker (chọn ảnh từ thư viện máy)
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
