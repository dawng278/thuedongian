<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .gradient-border-bottom {
            position: relative;
        }
        .gradient-border-bottom::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(to right, #2563eb, #40c2fd);
        }
        .gradient-bg {
            background: linear-gradient(135deg, #004ac6, #40c2fd);
        }

        /* Custom Stepper Input hide arrows */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-lg min-h-screen flex flex-col md:hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-surface docked full-width top-0 shadow-sm z-50 gradient-border-bottom">
<div class="flex items-center justify-between px-margin-mobile w-full h-16">
<!-- Leading / Store Selector -->
<button class="flex items-center gap-xs text-on-surface hover:bg-surface-container-lowest p-sm rounded-lg transition-colors active:scale-95">
<span class="font-title-md text-title-md truncate max-w-[150px]">Quán Phở Hà Nội</span>
<span class="material-symbols-outlined text-outline">expand_more</span>
</button>
<!-- Trailing / Mode Toggle -->
<div class="flex items-center bg-surface-container-low rounded-full p-xs">
<button class="px-md py-xs rounded-full bg-primary-container text-on-primary-container font-body-sm text-body-sm shadow-sm transition-all active:scale-95">
                    Bán hàng
                </button>
<button class="px-md py-xs rounded-full text-on-surface-variant font-body-sm text-body-sm hover:bg-surface-container transition-all active:scale-95">
                    Quản lý
                </button>
</div>
</div>
</header>
<!-- Main Content - Canvas -->
<main class="flex-1 overflow-y-auto px-margin-mobile py-lg pb-32">
<!-- Category Chips (Optional but good for UX) -->
<div class="flex gap-sm overflow-x-auto pb-md mb-md hide-scrollbar">
<button class="whitespace-nowrap px-md py-sm bg-primary-container text-on-primary-container rounded-full font-body-sm text-body-sm shadow-sm">Tất cả</button>
<button class="whitespace-nowrap px-md py-sm bg-surface-container text-on-surface rounded-full font-body-sm text-body-sm border border-outline-variant">Phở</button>
<button class="whitespace-nowrap px-md py-sm bg-surface-container text-on-surface rounded-full font-body-sm text-body-sm border border-outline-variant">Bún</button>
<button class="whitespace-nowrap px-md py-sm bg-surface-container text-on-surface rounded-full font-body-sm text-body-sm border border-outline-variant">Đồ uống</button>
</div>
<!-- Product Grid -->
<div class="grid grid-cols-2 gap-md">
<!-- Product Item 1: Phở Bò (Selected State) -->
<div class="relative bg-surface-container-lowest rounded-2xl shadow-[0px_4px_12px_rgba(0,0,0,0.05)] border-2 border-primary overflow-hidden flex flex-col group transition-all">

<div class="absolute top-sm right-sm bg-error text-on-error font-data-tabular text-[12px] font-bold px-2 py-0.5 rounded-full z-10 shadow-sm">
                    2
                </div>

<div class="h-28 w-full bg-surface-container-highest relative overflow-hidden">

</div>
<!-- Content -->
<div class="p-sm flex flex-col flex-1">
<h3 class="font-body-lg text-body-lg text-on-surface font-medium line-clamp-2">Phở Bò Tái Nạm</h3>
<div class="mt-auto pt-sm flex flex-col gap-xs">
<span class="font-data-tabular text-data-tabular text-primary font-bold">45.000đ</span>
<!-- Stepper Control -->
<div class="flex items-center justify-between bg-surface-container-low rounded-lg p-xs mt-sm border border-primary/20">
<button class="w-8 h-8 flex items-center justify-center bg-surface-container-lowest rounded-md text-on-surface-variant hover:bg-surface-container transition-colors shadow-sm active:scale-90">
<span class="material-symbols-outlined text-[18px]">remove</span>
</button>
<span class="font-data-tabular text-data-tabular text-on-surface font-semibold">2</span>
<button class="w-8 h-8 flex items-center justify-center bg-primary text-on-primary rounded-md hover:bg-primary-container transition-colors shadow-sm active:scale-90">
<span class="material-symbols-outlined text-[18px]">add</span>
</button>
</div>
</div>
</div>
</div>

</div>

<div class="p-sm flex flex-col flex-1">

<span class="font-data-tabular text-data-tabular text-on-surface-variant font-bold">50.000đ</span>

<span class="font-data-tabular text-data-tabular text-on-surface-variant font-bold">10.000đ</span>

</div>
</div>

<div class="mt-auto pt-sm flex flex-col gap-xs">

<div class="flex items-center justify-between bg-surface-container-low rounded-lg p-xs mt-sm border border-primary/20">
<button class="w-8 h-8 flex items-center justify-center bg-surface-container-lowest rounded-md text-on-surface-variant hover:bg-surface-container transition-colors shadow-sm active:scale-90">

</button>
<span class="font-data-tabular text-data-tabular text-on-surface font-semibold">1</span>

</div>
</div>
</div>
</div>
</div>

</div>
<div class="flex flex-col">
<span class="font-body-sm text-body-sm text-primary-fixed opacity-90">3 món</span>
<span class="font-data-tabular text-data-tabular font-bold">120.000đ</span>
</div>
</div>
<button class="bg-surface-container-lowest text-primary font-title-md text-title-md px-lg py-sm rounded-xl shadow-sm hover:bg-surface-container-low active:scale-95 transition-all flex items-center gap-xs">
<span>Tính tiền</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</div>
