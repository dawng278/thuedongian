<body class="bg-background text-on-background antialiased h-screen w-screen overflow-hidden flex flex-col md:flex-row">
<!-- Visual Hero Section (Mobile: Top 38%, Desktop: Left 50%) -->
<div class="relative w-full h-[335px] md:h-full md:w-1/2 flex-shrink-0">
<!-- Background Image -->
<img alt="Retail counter background" class="absolute inset-0 w-full h-full object-cover" data-alt="A bright, modern retail coffee shop counter scene during daytime. The environment is well-lit with natural sunlight, showcasing a clean, professional small business setting. The overall aesthetic aligns with a high-key, crisp corporate light-mode style, featuring subtle blue accents that match a refined financial tool's branding." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCLpXG5Y2AwIcOZhuK_mjhmx5avX-xt3kRQbRDRZ-42tj9tgaRrPfJvx0tla6bziTRhLUhgIccQZjf9kOHNa_sbNwsUZfd2hsf5Y2BfNAnB4G-vkzxbAIKVDX_FIdzKk2Co_PDgOAMayDLzT6EtQIN3ZwflW-0zf4ZlU_JU1wmhvXVamx4iFPkNR7GK4VmOUyirh_s3CP4nPka143zmV-_FuyFgUnKuUNGJvhdCKCgLCHNccPHk4i8CXRtwYaxJbE_gDzW8oEKyqZ8"/>
<!-- Gradient Overlay -->
<div class="absolute inset-0 hero-gradient"></div>
<!-- Logo/Branding -->
<div class="absolute inset-0 flex flex-col items-center justify-center p-lg">
<div class="w-20 h-20 bg-white/20 backdrop-blur-md rounded-2xl flex items-center justify-center border border-white/30 shadow-lg mb-md">
<span class="material-symbols-outlined text-white text-[40px] fill" style="font-variation-settings: 'FILL' 1;">receipt_long</span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-white text-center drop-shadow-sm">
                TaxEasy 2026
            </h1>
</div>
</div>
<!-- Form Section (Mobile: Bottom 62%, Desktop: Right 50%) -->
<div class="relative w-full h-[548px] md:h-full md:w-1/2 bg-surface-container-lowest flex-grow flex flex-col pt-xl px-margin-mobile md:px-margin-desktop md:justify-center rounded-t-[32px] md:rounded-none md:rounded-l-[32px] -mt-6 md:mt-0 z-10 shadow-[0_-8px_24px_rgba(0,0,0,0.05)] md:shadow-[-8px_0_24px_rgba(0,0,0,0.05)] overflow-y-auto">
<!-- Mobile drag handle -->
<div class="w-12 h-1.5 bg-outline-variant rounded-full mx-auto mb-lg md:hidden"></div>
<div class="max-w-md w-full mx-auto pb-lg">
<!-- Header -->
<div class="mb-xl text-center md:text-left">
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-sm">
                    Đăng nhập
                </h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">
                    Tiếp tục quản lý các quán của bạn
                </p>
</div>
<!-- Form -->
<form class="space-y-md" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="space-y-sm">
<label class="font-body-sm text-body-sm text-on-surface-variant block" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full h-12 pl-12 pr-md bg-surface border border-outline-variant rounded-[16px] font-body-lg text-body-lg text-on-surface focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim transition-all outline-none" id="email" placeholder="Nhập địa chỉ email" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="font-body-sm text-body-sm text-on-surface-variant block" for="password">Mật khẩu</label>
<a class="font-body-sm text-body-sm text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">Quên mật khẩu?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full h-12 pl-12 pr-12 bg-surface border border-outline-variant rounded-[16px] font-body-lg text-body-lg text-on-surface focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim transition-all outline-none" id="password" placeholder="Nhập mật khẩu" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="visibility-icon">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me (Optional addition for better UX) -->
<div class="flex items-center pt-xs">
<input class="w-4 h-4 rounded text-primary border-outline-variant focus:ring-primary focus:ring-offset-surface-container-lowest bg-surface" id="remember" type="checkbox"/>
<label class="ml-2 font-body-sm text-body-sm text-on-surface-variant" for="remember">Ghi nhớ đăng nhập</label>
</div>
<!-- Submit Button -->
<button class="w-full h-12 mt-xl bg-primary hover:bg-on-primary-fixed-variant text-on-primary font-title-md text-title-md rounded-[16px] transition-all active:scale-[0.98] shadow-sm flex items-center justify-center gap-sm" type="submit">
                    Đăng nhập
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Sign Up Link -->
<div class="mt-xl text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Chưa có tài khoản?
                    <a class="font-title-md text-body-lg text-primary hover:text-on-primary-fixed-variant transition-colors ml-1" href="#">Đăng ký ngay</a>
</p>
</div>
</div>
</div>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const visibilityIcon = document.getElementById('visibility-icon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                visibilityIcon.textContent = 'visibility';
            } else {
                passwordInput.type = 'password';
                visibilityIcon.textContent = 'visibility_off';
            }
        }
    </script>
</body></html>
