<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }

        /* Custom Scrollbar for form if needed */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #c3c6d7;
            border-radius: 4px;
        }

<body class="bg-surface-container-high h-screen w-full relative overflow-hidden flex flex-col items-center justify-center font-body-lg text-on-surface">
<!-- Backdrop for Context -->
<div class="absolute inset-0 z-0 bg-surface flex flex-col hidden md:flex">
<!-- Simulated Desktop Background to show this is a mobile-focused view -->
<div class="p-margin-desktop opacity-30 pointer-events-none">
<div class="h-12 bg-surface-variant w-1/3 rounded-xl mb-xl"></div>
<div class="grid grid-cols-3 gap-lg">
<div class="h-48 bg-surface-variant rounded-xl"></div>
<div class="h-48 bg-surface-variant rounded-xl"></div>
<div class="h-48 bg-surface-variant rounded-xl"></div>
</div>
</div>
</div>
<!-- Mobile Frame / Canvas -->
<div class="relative w-full max-w-[428px] h-full md:h-[795px] md:rounded-[40px] md:shadow-2xl bg-surface-variant overflow-hidden z-10 flex flex-col border border-outline-variant">
<!-- Dim Overlay -->
<div aria-hidden="true" class="absolute inset-0 bg-on-surface/40 z-20"></div>
<!-- Bottom Sheet -->
<div class="absolute bottom-0 w-full bg-surface-container-lowest rounded-t-[24px] z-30 flex flex-col shadow-[0_-12px_24px_rgba(0,0,0,0.1)] bottom-sheet" style="max-height: 90%;">
<!-- Handle & Header -->
<div class="px-margin-mobile pt-md pb-sm sticky top-0 bg-surface-container-lowest rounded-t-[24px] z-40 border-b border-surface-variant">
<div class="w-12 h-[4px] bg-outline-variant rounded-full mx-auto mb-lg"></div>
<div class="flex justify-between items-center">
<h2 class="font-title-md text-title-md text-on-surface">Thêm sản phẩm mới</h2>
<button class="p-2 -mr-2 text-on-surface-variant hover:text-on-surface transition-colors rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined" data-weight="regular">close</span>
</button>
</div>
</div>
<!-- Scrollable Content Area -->
<div class="flex-1 overflow-y-auto px-margin-mobile py-lg scroll-smooth pb-[100px]">
<!-- Preview Card (Bento Style) -->
<div class="mb-xl bg-surface rounded-[20px] p-md border border-surface-variant shadow-sm flex items-center gap-md">
<div class="w-16 h-16 rounded-[12px] bg-surface-container-high border border-outline-variant flex items-center justify-center overflow-hidden shrink-0">

</div>
<div class="flex-1 min-w-0">
<p class="font-body-sm text-body-sm text-on-surface-variant mb-xs">Xem trước hiển thị</p>
<h3 class="font-title-md text-title-md text-on-surface truncate">Salad Cá Hồi</h3>
<div class="flex items-baseline gap-xs mt-xs">
<span class="font-data-tabular text-data-tabular text-primary">85,000</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">VNĐ / Phần</span>
</div>
</div>
</div>
<!-- Form Section -->
<form class="space-y-lg">
<!-- Image Upload Tile -->
<div class="space-y-sm">
<label class="font-body-sm text-body-sm text-on-surface-variant font-medium">Ảnh sản phẩm</label>
<div class="flex gap-md">
<div class="w-24 h-24 rounded-xl border-2 border-dashed border-primary bg-surface-container flex flex-col items-center justify-center text-primary cursor-pointer hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined mb-xs" data-weight="regular">add_photo_alternate</span>
<span class="font-body-sm text-body-sm text-[12px]">Tải ảnh lên</span>
</div>
<div class="flex-1 rounded-xl bg-surface-variant flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-outline" data-weight="regular">image</span>
</div>
</div>
</div>

<label class="font-body-sm text-body-sm text-on-surface-variant font-medium" for="productName">Tên sản phẩm *</label>
<input class="w-full h-12 px-md rounded-xl bg-surface border border-outline-variant text-on-surface font-body-lg text-body-lg focus:outline-none focus:border-primary transition-all placeholder:text-outline" id="productName" placeholder="VD: Cà phê sữa đá" type="text" value="Salad Cá Hồi"/>
</div>
<!-- Price & Unit Group (Ergonomic layout for 1 hand) -->
<div class="grid grid-cols-2 gap-md">
<div class="space-y-sm">
<label class="font-body-sm text-body-sm text-on-surface-variant font-medium" for="productPrice">Giá bán *</label>
<div class="relative">
<input class="w-full h-12 pl-md pr-[50px] rounded-xl bg-surface border border-outline-variant text-on-surface font-data-tabular text-data-tabular focus:outline-none focus:border-primary transition-all placeholder:text-outline" id="productPrice" placeholder="0" type="number" value="85000"/>
<span class="absolute right-md top-1/2 -translate-y-1/2 font-body-sm text-body-sm text-on-surface-variant pointer-events-none">đ</span>
</div>
</div>
<div class="space-y-sm">
<label class="font-body-sm text-body-sm text-on-surface-variant font-medium" for="productUnit">Đơn vị tính</label>
<div class="relative">
<select class="w-full h-12 pl-md pr-xl rounded-xl bg-surface border border-outline-variant text-on-surface font-body-lg text-body-lg focus:outline-none focus:border-primary appearance-none transition-all" id="productUnit">
<option>Phần</option>
<option>Ly</option>
<option>Combo</option>
<option>Cái</option>
</select>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
</div>
<!-- Category -->
<div class="space-y-sm">
<label class="font-body-sm text-body-sm text-on-surface-variant font-medium" for="productCategory">Nhóm danh mục</label>
<div class="relative">
<select class="w-full h-12 pl-md pr-xl rounded-xl bg-surface border border-outline-variant text-on-surface font-body-lg text-body-lg focus:outline-none focus:border-primary appearance-none transition-all" id="productCategory">
<option>Đồ ăn nhẹ</option>
<option>Đồ uống</option>
<option>Món chính</option>
<option>Tráng miệng</option>
</select>
<span class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
</form>
</div>

<div class="absolute bottom-0 w-full px-margin-mobile py-md bg-surface-container-lowest border-t border-surface-variant shadow-[0_-4px_12px_rgba(0,0,0,0.02)]">

<span class="material-symbols-outlined text-[20px]" data-weight="fill">add_circle</span>
                    Thêm món
